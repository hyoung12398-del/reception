<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>受付</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Reception</p>
          <h1>受付</h1>
          <p id="deviceLabel" class="device-label">端末を確認しています...</p>
        </div>
      </section>

      <section class="panel">
        <div id="choiceGrid" class="choice-grid">
          <button id="chooseStaff" class="choice-button" type="button">担当講師の名前を検索する</button>
          <button id="chooseTrial" class="choice-button accent-outline" type="button">体験レッスンはこちら</button>
          <button id="chooseRental" class="choice-button quiet" type="button">レッスン室レンタルの生徒さんはこちら</button>
        </div>

        <div id="formArea" class="hidden">
          <button id="backButton" class="back-button" type="button">戻る</button>

          <div id="staffArea" class="hidden">
            <div class="section-title">担当講師の名前を検索する</div>
            <label class="search-field">
              <span>先生の名前</span>
              <input id="staffSearch" type="search" autocomplete="off" placeholder="名前で検索" />
            </label>
            <div id="staffGrid" class="staff-grid"></div>
            <p id="emptyStaff" class="empty">名前を入力すると先生が表示されます。</p>
          </div>

          <label class="field">
            <span>来訪者の名前</span>
            <input id="visitorName" type="text" autocomplete="name" placeholder="例：山田 太郎" />
          </label>

          <button id="sendButton" class="primary hidden" disabled>呼び出す</button>
          <button id="trialButton" class="trial-button hidden" disabled>体験レッスン受付</button>
          <button id="rentalButton" class="secondary-action hidden" disabled>レッスン室レンタルを記録</button>
        </div>
        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <div id="completionOverlay" class="completion-overlay hidden" role="status" aria-live="polite">
      <div class="completion-dialog">
        <p>受付は完了しました。</p>
        <p>待合室にてお待ちください。</p>
        <button id="completionClose" class="completion-close" type="button">閉じる</button>
      </div>
    </div>

    <script src="/reception.js"></script>
  </body>
</html>
