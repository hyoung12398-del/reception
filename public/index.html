<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>受付</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Reception</p>
          <h1>受付</h1>
          <p id="deviceLabel" class="device-label">端末を確認しています...</p>
        </div>
      </section>

      <section class="panel">
        <label class="field">
          <span>来訪者名</span>
          <input id="visitorName" type="text" autocomplete="name" placeholder="例：山田 太郎" />
        </label>

        <div>
          <div class="section-title">担当者を選択</div>
          <label class="search-field">
            <span>先生を検索</span>
            <input id="staffSearch" type="search" autocomplete="off" placeholder="名前で検索" />
          </label>
          <div id="staffGrid" class="staff-grid"></div>
          <p id="emptyStaff" class="empty">名前を入力すると先生が表示されます。</p>
        </div>

        <button id="sendButton" class="primary" disabled>呼び出す</button>
        <button id="trialButton" class="trial-button" disabled>体験レッスンはこちら</button>
        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="/reception.js"></script>
  </body>
</html>
